name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4 
        with:
          dotnet-version: "10.0.x"
      
      - name: Restore
        run: dotnet restore BirdWatching.slnx

      - name: Build 
        run: dotnet build BirdWatching.slnx --no-restore --configuration Release

      - name: Test (with coverage collection)
        run: dotnet test BirdWatching.slnx --no-build --configuration Release --collect:"XPlat Code Coverage"
